services:
  petille:
    image: ghcr.io/kolapsis/petille:${PETILLE_IMAGE_TAG:-latest}
    container_name: petille
    restart: unless-stopped
    networks:
      - traefik_proxy
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=traefik_proxy"

      # HTTP → HTTPS redirect.
      - "traefik.http.routers.petille-http.entrypoints=web"
      - "traefik.http.routers.petille-http.rule=Host(`${PETILLE_HOST:-petille.app}`)"
      - "traefik.http.routers.petille-http.middlewares=petille-https"
      - "traefik.http.middlewares.petille-https.redirectscheme.scheme=https"
      - "traefik.http.middlewares.petille-https.redirectscheme.permanent=true"

      # HTTPS (Let's Encrypt via resolver "letsencrypt").
      - "traefik.http.routers.petille.entrypoints=websecure"
      - "traefik.http.routers.petille.rule=Host(`${PETILLE_HOST:-petille.app}`)"
      - "traefik.http.routers.petille.tls=true"
      - "traefik.http.routers.petille.tls.certresolver=letsencrypt"
      - "traefik.http.services.petille.loadbalancer.server.port=80"

      # HSTS + security middlewares.
      - "traefik.http.middlewares.petille-sec.headers.stsSeconds=31536000"
      - "traefik.http.middlewares.petille-sec.headers.stsIncludeSubdomains=true"
      - "traefik.http.middlewares.petille-sec.headers.stsPreload=true"
      - "traefik.http.middlewares.petille-sec.headers.forceSTSHeader=true"
      - "traefik.http.routers.petille.middlewares=petille-sec"

networks:
  traefik_proxy:
    external: true
