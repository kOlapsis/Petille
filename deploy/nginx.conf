server {
  listen 80 default_server;
  listen [::]:80 default_server;
  server_name _;

  root /usr/share/nginx/html;
  index index.html;

  # Security headers.
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-Frame-Options "DENY" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;
  add_header Permissions-Policy "camera=(self), microphone=(), geolocation=()" always;

  # Compression.
  gzip on;
  gzip_vary on;
  gzip_proxied any;
  gzip_comp_level 6;
  gzip_types
    text/plain
    text/css
    text/javascript
    application/javascript
    application/json
    application/manifest+json
    image/svg+xml
    application/xml
    application/rss+xml;

  # Long cache for build-hashed assets.
  location ~* ^/assets/.*-[A-Za-z0-9_-]{6,}\.(js|css|woff2?|png|jpg|jpeg|webp|avif|svg)$ {
    access_log off;
    expires 1y;
    add_header Cache-Control "public, max-age=31536000, immutable";
    try_files $uri =404;
  }

  # Short cache for service worker and manifest.
  location = /sw.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    add_header X-Content-Type-Options "nosniff" always;
    try_files $uri =404;
  }
  location = /registerSW.js {
    add_header Cache-Control "no-cache, no-store, must-revalidate";
    try_files $uri =404;
  }
  location = /manifest.webmanifest {
    types { application/manifest+json webmanifest; }
    default_type application/manifest+json;
    add_header Cache-Control "public, max-age=3600";
    try_files $uri =404;
  }

  # robots + sitemap.
  location = /robots.txt { try_files $uri =404; }
  location = /sitemap.xml { try_files $uri =404; }

  # SPA fallback — sert le HTML prérendu si disponible, sinon /index.html.
  location / {
    try_files $uri $uri.html $uri/index.html /index.html;
  }

  error_page 404 /index.html;
}
